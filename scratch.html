<script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    const urlParams = new URLSearchParams(window.location.search);
    const currentMode = urlParams.get('mode') || 'home'; // કયો મોડ છે તે પકડશે
    
    window.deviceId = urlParams.get('ppid') || localStorage.getItem('user_id');
    if (!window.deviceId || window.deviceId === 'guest') {
        if(!localStorage.getItem('user_id')) {
            window.deviceId = 'u_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            localStorage.setItem('user_id', window.deviceId);
        } else {
            window.deviceId = localStorage.getItem('user_id');
        }
    }

    const hasGclid = urlParams.has('gclid');

    // CONFIG માં ફેરફાર: જે-તે મોડ મુજબ પેજ ટ્રેક કરશે
    gtag('config', 'G-BMZY691ZG4', {
        'user_id': window.deviceId,
        'page_path': window.location.pathname + (urlParams.get('mode') ? '?mode=' + urlParams.get('mode') : ''),
        'page_title': currentMode.toUpperCase(),
        'cookie_flags': 'SameSite=None;Secure',
        'campaign_source': hasGclid ? undefined : (urlParams.get('utm_source') || 'android_app'),
        'campaign_medium': hasGclid ? undefined : (urlParams.get('utm_medium') || 'app_cct'),
        'campaign_name': hasGclid ? undefined : (urlParams.get('utm_campaign') || 'install_flow'),
        'debug_mode': true // આનાથી તમે Real-time માં તરત ડેટા જોઈ શકશો
    });

    window.trackGA = function(eventName, params = {}) {
        let eventParams = {
            'user_id': window.deviceId,
            'client_id': window.deviceId,
            'platform': 'Android_CCT',
            'screen_name': currentMode, // કયા સ્ક્રીન પર ઇવેન્ટ બની તે પણ મોકલશે
            ...params
        };
        
        if (params.is_conversion) {
            eventParams['transaction_id'] = window.deviceId + '_' + eventName;
        }
        gtag('event', eventName, eventParams);
        console.log("GA Event Logged:", eventName, eventParams); // ચેક કરવા માટે
    };
</script>

    <script>
        // Wrap updateDashboard to automatically render our cards list whenever dashboard updates
        const originalUpdateDashboard = window.updateDashboard;
        window.updateDashboard = function() {
            if (typeof originalUpdateDashboard === 'function') {
                originalUpdateDashboard();
            }
            renderCardsList();
        };

        document.addEventListener('DOMContentLoaded', () => {
            updateDashboard();
        });

        function renderCardsList() {
            const count = parseInt(localStorage.getItem('scratch_cards')) || 0;
            const grid = document.getElementById('cards-grid');
            const empty = document.getElementById('empty-state');
            document.getElementById('total-card-count').innerText = count + " Cards";

            if (count <= 0) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            let html = '';
            for (let i = 1; i <= count; i++) {
                html += `
                <div onclick="openScratchForCard(${i})" class="bg-white dark:bg-gray-900 rounded-[2rem] border border-gray-100 dark:border-gray-800 p-5 flex flex-col items-center justify-center cursor-pointer shadow-sm active:scale-95 transition-all hover:border-blue-500">
                    <div class="w-12 h-12 bg-blue-50 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center mb-3">
                        <i class="fa-solid fa-ticket-simple text-blue-600 text-xl rotate-45"></i>
                    </div>
                    <span class="text-[10px] font-black dark:text-white uppercase italic">Lucky Card #${i}</span>
                    <span class="text-[7px] font-bold text-gray-400 mt-1 uppercase">Tap to reveal</span>
                </div>`;
            }
            grid.innerHTML = html;
        }

        function openScratchForCard(id) {
            document.getElementById('scratch-cover').style.opacity = "1";
            document.getElementById('scratch-modal').classList.remove('hidden');
            
            const btn = document.getElementById('scratch-btn');
            btn.innerText = "Scratch First";
            btn.classList.add('opacity-40', 'pointer-events-none');
            
            document.getElementById('scratch-cover').onclick = function() {
                this.style.opacity = "0";
                const isDiamond = Math.random() > 0.85;
                const amount = isDiamond ? Math.floor(Math.random() * 30) + 10 : Math.floor(Math.random() * 200) + 20;
                document.getElementById('scratch-prize-icon').innerText = isDiamond ? "💎" : "💰";
                document.getElementById('scratch-prize-amount').innerText = amount;
                window.tempReward = { type: isDiamond ? 'diamond' : 'coin', amount: amount };
                btn.innerText = "Claim Reward";
                btn.classList.remove('opacity-40', 'pointer-events-none');
            };
        }

        async function processInventoryScratch() {
            let cards = parseInt(localStorage.getItem('scratch_cards')) || 0;
            if (cards <= 0) return;
            
            localStorage.setItem('scratch_cards', cards - 1);
            if (window.tempReward.type === 'diamond') {
                let d = parseInt(localStorage.getItem('total_diamonds')) || 0;
                localStorage.setItem('total_diamonds', d + window.tempReward.amount);
            } else {
                let w = parseInt(localStorage.getItem('total_wallet')) || 0;
                localStorage.setItem('total_wallet', w + window.tempReward.amount);
            }

            await saveToServer();
            updateDashboard();
            document.getElementById('scratch-modal').classList.add('hidden');
            renderCardsList();
        }

        function closeScratchModal() {
            document.getElementById('scratch-modal').classList.add('hidden');
        }
    </script>
